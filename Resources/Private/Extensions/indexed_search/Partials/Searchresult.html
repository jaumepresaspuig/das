<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:is="http://typo3.org/ns/TYPO3/CMS/IndexedSearch/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<div class="tx-indexedsearch-res mb-3">
    <h3>
        <f:if condition="{settings.displayResultNumber}"><span class="tx-indexedsearch-result-number">{row.result_number}</span></f:if>
        <span class="tx-indexedsearch-title">{row.title -> f:format.raw()}</span>
        <small class="tx-indexedsearch-percent">{is:searchResult.rating(firstRow: firstRow, sortOrder: searchParams.sortOrder, row: row)}</small>
    </h3>
    <p class="tx-indexedsearch-description mb-0">{row.description -> f:format.raw()}</p>
    <f:if condition="{row.headerOnly} == 0">
        <p class="small">
            <strong><f:translate key="result.size" />:</strong> {row.size}<br />
            <strong><f:translate key="result.created" />:</strong> <f:format.date>@{row.created}</f:format.date><br />
            <strong><f:translate key="result.modified" />:</strong> <f:format.date>@{row.modified}</f:format.date><br />
            <strong><f:translate key="result.path" />:</strong> <f:format.html>{row.path}</f:format.html>
        </p>
    </f:if>
    <f:if condition="{row.subresults}">
        <p class="tx-indexedsearch-list">
            <f:for each="{row.subresults.items}" as="subrow" iteration="iteration">
                <f:render partial="Searchresult" arguments="{row: subrow}" />
            </f:for>
        </p>
    </f:if>
</div>
<hr />

</html>
