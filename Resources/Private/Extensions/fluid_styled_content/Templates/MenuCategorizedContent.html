<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />
<f:section name="Main">
    <f:if condition="{menu}">
        <f:if condition="{data.tx_das_stylemenu}">
            <f:then>
                <f:render partial="Menus/StyledList" arguments="{content: content, type: 'categorized_content'}" />
            </f:then>
            <f:else>
                <f:render partial="Menus/SimpleList" arguments="{content: content, type: 'categorized_content'}" />
            </f:else>
        </f:if>
    </f:if>
</f:section>
</html>
