{namespace das=Jp\Das\ViewHelpers}

<figure class="figure w-100" data-aos="{f:if(condition: '{data.tx_das_galleryanimate}', then: 'fade-up')}" data-aos-delay="100">
    <f:if condition="{file.extension} == 'youtube' || {file.extension} == 'vimeo'">
        <f:then>
            <f:variable name="thumbnail" value="{das:getThumbnail(provider: '{file.extension}', identifier: '{file.contents}')}" />
            <f:if condition="{file.extension} == 'youtube'">
                <f:then>
                    <f:variable name="url" value="{f:if(condition: '{data.image_zoom}', then: 'https://www.youtube-nocookie.com/embed/{file.contents}', else: 'https://www.youtube.com/watch?v={file.contents}')}" />
                </f:then>
                <f:else>
                    <f:variable name="url" value="https://vimeo.com/{file.contents}" />
                </f:else>
            </f:if>
            <a href="{url}" class="play-video play-video-{file.extension}{f:if(condition: '{data.image_zoom}', then: ' glightbox glightbox-{gallery_id}')}"{f:if(condition: '!{data.image_zoom}', then: ' data-glightbox-id="glightbox-{gallery_id}" target="_blank"')}>
                <f:image src="{thumbnail}" width="{width}" height="{height}" alt="{file.description}" title="{file.description}" loading="{settings.lazyLoading}" class="img-fluid w-100"  />
            </a>
        </f:then>
        <f:else>
            <f:if condition="{data.image_zoom}">
                <f:then>           
                    <a href="{file.publicUrl}" class="glightbox glightbox-{gallery_id}" data-glightbox-id="glightbox-{gallery_id}">     
                        <video width="{width}" controls {f:if(condition: '{file.properties.autoplay}', then: 'autoplay')} class="w-100">
                            <source src="{file.publicUrl}" type="{file.properties.mime_type}">
                        </video>
                        <div class="overlay z-1"></div>
                    </a>  
                </f:then>
                <f:else>
                    <video width="{width}" controls {f:if(condition: '{file.properties.autoplay}', then: 'autoplay')} class="w-100">
                        <source src="{file.publicUrl}" type="{file.properties.mime_type}">
                    </video>
                </f:else>
            </f:if>
        </f:else>
    </f:if> 
    <f:if condition="{file.description}">
        <figcaption class="figure-caption">
            <f:format.nl2br>{file.description}</f:format.nl2br>
        </figcaption>
    </f:if>
</figure>
