<f:layout name="Default" />

<f:section name="Header">
    <f:if condition="{gallery.position.noWrap} != 1">
        <f:render partial="Header/All" arguments="{_all}" />
    </f:if>
</f:section>

<f:section name="Main">
    <div class="row">
        <f:variable name="gallery_width" value="{f:if(condition: '{data.imageorient} >= 25', then: '{data.tx_das_gallerywidth}', else: '12')}" />
        <f:variable name="bodytext_width" value="{f:if(condition: '{data.imageorient} >= 25', then: '{v:math.subtract(a: 12, b: gallery_width)}', else: '12')}" />       
        <f:if condition="{data.imageorient} == 0 || {data.imageorient} == 26">
            <f:render partial="Media/Gallery" arguments="{_all}" />
        </f:if>
        <f:if condition="{data.bodytext}">
            <f:then>
                <div class="col-md-{bodytext_width}{f:if(condition: '{data.tx_das_textincolumns} > 1', then: ' text-column text-column-{data.tx_das_textincolumns}')}{f:if(condition: '{data.imageorient} == 25 && {data.tx_das_order1}', then: ' mobile-order-2')}">
                    <f:if condition="{gallery.position.noWrap}">
                        <f:render partial="Header/All" arguments="{_all}" />
                    </f:if>
                    {v:format.replace(content: '{data.bodytext}', substring: '#YEAR#', replacement: '{f:format.date(date: \'now\', format: \'Y\')}') -> f:format.html()}
                </div>
            </f:then>
            <f:else>
                <f:if condition="{gallery.position.noWrap} && {data.header}">
                    <div class="ce-bodytext">
                        <f:render partial="Header/All" arguments="{_all}" />
                    </div>
                </f:if>
            </f:else>
        </f:if>
        <f:if condition="{data.imageorient} == 8 || {data.imageorient} == 25">
            <f:render partial="Media/Gallery" arguments="{_all}" />
        </f:if>
    </div>
</f:section>
