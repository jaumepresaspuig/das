<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:if condition="{pagination}">
    <nav class="mt-3">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item{f:if(condition: '!{pagination.previousPageNumber}', then: ' disabled')}">
                <a href="#" class="page-link tx-indexedsearch-page-selector" data-prefix="tx_indexedsearch" data-pointer="0" data-free-index-uid="{freeIndexUid}">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            <li class="page-item{f:if(condition: '!{pagination.previousPageNumber}', then: ' disabled')}">
                <a href="#" class="page-link tx-indexedsearch-page-selector" data-prefix="tx_indexedsearch" data-pointer="{pagination.previousPageNumber - 1}" data-free-index-uid="{freeIndexUid}">
                    <span aria-hidden="true">&lsaquo;</span>
                </a>
            </li>
            <f:for each="{pagination.allPageNumbers}" as="pageNumber">
                <f:variable name="pageLabel" value="{f:translate(key: 'displayResults.page')} {pageNumber}" />
                <li class="page-item{f:if(condition: '{pageNumber} == {searchParams.pointer + 1}', then: ' active')}">
                    <a href="#" class="page-link tx-indexedsearch-page-selector" data-prefix="tx_indexedsearch" data-pointer="{pageNumber - 1}" data-free-index-uid="{freeIndexUid}"{f:if(condition: '{pageNumber} == {searchParams.pointer + 1}', then: ' aria-current="page"')}>{pageNumber}</a>
                </li>
            </f:for>
            <li class="page-item{f:if(condition: '!{pagination.nextPageNumber}', then: ' disabled')}">
                <a href="#" class="page-link tx-indexedsearch-page-selector" data-prefix="tx_indexedsearch" data-pointer="{pagination.nextPageNumber - 1}" data-free-index-uid="{freeIndexUid}">
                    <span aria-hidden="true">&rsaquo;</span>
                </a>
            </li>
            <li class="page-item{f:if(condition: '!{pagination.nextPageNumber}', then: ' disabled')}">
                <a href="#" class="page-link tx-indexedsearch-page-selector" data-prefix="tx_indexedsearch" data-pointer="{pagination.paginator.numberOfPages  - 1}" data-free-index-uid="{freeIndexUid}">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>
</f:if>

</html>
