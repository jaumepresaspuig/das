<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
    
<div class="tx-indexedsearch-searchbox">
    <f:form action="search" method="post" id="tx_indexedsearch" pageUid="{settings.targetPid}">
        <div class="tx-indexedsearch-hidden-fields">
            <f:form.hidden name="search[_sections]" value="0" />
            <f:form.hidden name="search[_freeIndexUid]" id="tx_indexedsearch_freeIndexUid" value="_" />
            <f:form.hidden name="search[pointer]" id="tx_indexedsearch_pointer" value="0" />
            <f:form.hidden name="search[ext]" value="{searchParams.ext}" />
            <f:form.hidden name="search[searchType]" value="{searchParams.searchType}" />
            <f:form.hidden name="search[defaultOperand]" value="{searchParams.defaultOperand}" />
            <f:form.hidden name="search[mediaType]" value="{searchParams.mediaType}" />
            <f:form.hidden name="search[sortOrder]" value="{searchParams.sortOrder}" />
            <f:form.hidden name="search[group]" value="{searchParams.group}" />
            <f:form.hidden name="search[desc]" value="{searchParams.desc}" />
            <f:form.hidden name="search[numberOfResults]" value="{searchParams.numberOfResults}" />
            <f:form.hidden name="search[extendedSearch]" value="{searchParams.extendedSearch}" />
        </div>
        <fieldset>
            <p class="form-floating">
                <f:form.textfield name="search[sword]" value="{sword}" id="tx-indexedsearch-searchbox-sword" placeholder="{f:translate(key: 'form.searchFor')}" class="form-control" />
                <label for="tx-indexedsearch-searchbox-sword"><f:translate key="form.searchFor" /></label>
            </p>
            <f:if condition="{searchParams.extendedSearch}">
                <f:if condition="{showTypeSearch}">
                    <p class="form-floating input-group">
                        <f:if condition="{allSearchTypes}">
                            <f:form.select name="search[searchType]" options="{allSearchTypes}" value="{searchParams.searchType}" id="tx-indexedsearch-selectbox-searchtype" class="tx-indexedsearch-selectbox-searchtype" class="form-select" />
                        </f:if>
                        <label for="tx-indexedsearch-selectbox-searchtype"><f:translate key="form.match" />:</label>
                        <f:if condition="{allDefaultOperands}">
                            <f:form.select name="search[defaultOperand]" options="{allDefaultOperands}" value="{searchParams.defaultOperand}" id="tx-indexedsearch-selectbox-defaultoperand" class="form-select" />
                        </f:if>
                    </p>
                </f:if>
                <f:if condition="{allMediaTypes}">
                    <p class="form-floating">
                        <f:form.select name="search[mediaType]" options="{allMediaTypes}" value="{searchParams.mediaType}" id="tx-indexedsearch-selectbox-media" class="form-select" />
                        <label for="tx-indexedsearch-selectbox-media"><f:translate key="form.searchIn" />:</label>
                    </p>
                </f:if>
                <f:if condition="{allSections}">
                    <p class="form-floating">
                        <f:form.select name="search[sections]" options="{allSections}" value="{searchParams.sections}" id="tx-indexedsearch-selectbox-sections" class="form-select" />
                        <label for="tx-indexedsearch-selectbox-sections"><f:translate key="form.fromSection" />:</label>
                    </p>
                </f:if>
                <f:if condition="{allIndexConfigurations}">
                    <p class="form-floating">
                        <f:form.select name="search[freeIndexUid]" options="{allIndexConfigurations}" value="{searchParams.freeIndexUid}" id="tx-indexedsearch-selectbox-freeIndexUid" class="form-select" />
                        <label for="tx-indexedsearch-selectbox-freeIndexUid"><f:translate key="form.freeIndexUid" />:</label>
                    </p>
                </f:if>
                <f:if condition="{showSortOrders}">
                    <p class="form-floating input-group">
                        <f:form.select name="search[sortOrder]" options="{allSortOrders}" value="{searchParams.sortOrder}" id="tx-indexedsearch-selectbox-order" class="form-select" />
                        <label for="tx-indexedsearch-selectbox-order"><f:translate key="form.orderBy" />:</label>
                        <f:form.select name="search[sortDesc]"  options="{allSortDescendings}" value="{searchParams.sortDesc}" id="tx-indexedsearch-selectbox-desc" class="form-select" />
                    </p>
                </f:if>
                <f:if condition="{allNumberOfResults}">
                    <p class="form-floating">
                        <f:form.select name="search[numberOfResults]" options="{allNumberOfResults}" value="{searchParams.numberOfResults}" id="tx-indexedsearch-selectbox-results" class="form-select" />
                        <label for="tx-indexedsearch-selectbox-results"><f:translate key="form.atATime" />:</label>
                    </p>
                </f:if>
                <f:if condition="{allGroups}">
                    <p class="mb-0">
                    </p>
                    <p class="form-floating">
                        <f:form.select name="search[group]" options="{allGroups}" value="{searchParams.group}" id="tx-indexedsearch-selectbox-group" class="form-select" />
                        <label for="tx-indexedsearch-selectbox-group"><f:translate key="form.style" />:</label>
                    </p>
                    <f:if condition="{settings.blind.extResume} == 0">
                        <p class="form-check form-switch mb-3">
                            <f:form.checkbox name="search[extResume]" id="tx_indexedsearch_extResume" checked="{searchParams.extResume}" value="1" class="form-check-input" />
                            <label for="tx_indexedsearch_extResume" class="form-check-label"><f:translate key="form.extResume" /></label>
                        </p>
                    </f:if>
                </f:if>
            </f:if>
            <p>
                <f:form.submit name="search[submitButton]" value="{f:translate(key: 'form.submit')}" id="tx-indexedsearch-searchbox-button-submit" class="btn btn-primary" />
                <f:if condition="{settings.displayAdvancedSearchLink}">
                    <f:if condition="{searchParams.extendedSearch}">
                        <f:then>
                            <f:link.action action="form" arguments="{search: {sword: sword, extendedSearch: 0}}" class="float-end btn btn-light btn-sm mt-1"><f:translate key="form.linkToRegularSearch" /></f:link.action>
                        </f:then>
                        <f:else>
                            <f:link.action action="form" arguments="{search: {sword: sword, extendedSearch: 1}}" class="float-end btn btn-light btn-sm mt-1"><f:translate key="form.linkToAdvancedSearch" /></f:link.action>
                        </f:else>
                    </f:if>
                </f:if>
            </p>
        </fieldset>
    </f:form>
</div>

</html>
