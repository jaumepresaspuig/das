<f:if condition="{home.tx_das_showpagetitle}">
        <div class="container">
    <h1>
        <f:if condition="{f:cObject(typoscriptObjectPath: 'lib.pageTitle')}">
            <f:then>
                {f:cObject(typoscriptObjectPath: 'lib.pageTitle')}
            </f:then>
            <f:else>
                {data.title}
            </f:else>
        </f:if>
        <f:if condition="{data.subtitle}">
            <br /><span class="fs-4">{data.subtitle}</span>
        </f:if>
    </h1>
        </div>
</f:if>
