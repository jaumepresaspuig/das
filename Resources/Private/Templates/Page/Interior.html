<f:render partial="HtmlHeader" arguments="{_all}" />
<f:render partial="Header" arguments="{_all}" />
<f:variable name="rootline" value="{v:page.rootline()}" />
<f:variable name="home" value="{rootline.0}" />
<f:if condition="{home.tx_das_breadcrumb} == 1">
    <f:render partial="Breadcrumb" arguments="{_all}" />
</f:if>
<div class="featured">
    <v:content.render column="4" />
</div>
<div class="pt-4">
    <f:if condition="{home.tx_das_breadcrumb} == 2">
        <f:render partial="Breadcrumb" arguments="{_all}" />
    </f:if>
    <!--TYPO3SEARCH_begin-->
    <f:render partial="H1" arguments="{_all}" />
    <v:content.render column="0" />
    <v:content.render column="5" slide="-1" />
    <!--TYPO3SEARCH_end-->
</div>
<f:render partial="Footer" arguments="{_all}" />
